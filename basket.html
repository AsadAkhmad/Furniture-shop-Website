<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Basket</title>
  <style>
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #333;
      padding: 10px;
      text-align: left;
    }
    .Logo{
            float: center;
            margin: 1em;
            max-width: 10%; 
            max-height: 10%;
            border-radius: 80px;
            display: block;
            margin: 0 auto 5px;
            box-shadow: 0 4px 8px rgba(14, 230, 111, 0.3); 
        }
        .Logo:hover{
            max-width: 12%; 
            max-height: 12%;
            border-radius: 120px;
        }
        body{
          background-color: rgb(181, 192, 240);
        }
        .btn {
            background-color: #4CAF50;
            color: white;
            padding: 10px 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn:hover {
            background-color: #45a049;
        }

        .btn:focus {
            outline: 2px solid #2e7d32;
            background-color: #3e8e41;
        }

        .btn:active {
            background-color: #2e7d32;
            transform: scale(0.98);
        }

        .btn-reset {
            background-color: #f44336;
        }

        .btn-reset:hover {
            background-color: #da190b;
        }

        .btn-reset:focus {
            outline: 2px solid #b71c1c;
            background-color: #c62828;
        }

        .btn-reset:active {
            background-color: #b71c1c;
            transform: scale(0.98);
        }
  </style>
</head>
<body>
  <h1>
    <img class="Logo" src="Images/Logo.jpeg">
    <p>Your Basket</p>
  </h1>
  <table>
    <thead>
      <tr>
        <th>Item</th>
        <th>Quantity</th>
      </tr>
    </thead>
    <tbody id="basket-items">
      <!-- Items will be inserted here -->
    </tbody>
  </table>

  <p><button class="btn" onclick="buyItems()">Buy</button></p>
  <p><button class="btn btn-reset" onclick="deleteItems()">Delete</button></p>
 
  <script>
    function loadBasket() {
      let basket = localStorage.getItem("basket") || "";
      let items = basket.split(",").filter(item => item.trim() !== "");
      let counts = {};

      for (let i = 0; i < items.length; i++) {
        let item = items[i].trim();
        if (counts[item]) {
          counts[item]++;
        } else {
          counts[item] = 1;
        }
      }

      let tbody = document.getElementById("basket-items");
      tbody.innerHTML = "";
      for (let item in counts) {
        let row = "<tr><td>" + item + "</td><td>" + counts[item] + "</td></tr>";
        tbody.innerHTML += row;
      }
    }

    window.onload = loadBasket;

    
    function buyItems() {
        let basket = localStorage.getItem("basket") || "";
        let items = basket.split(",").filter(item => item.trim() !== "");
        if (items.length === 0) {
        alert("Your basket is empty.");
        return;
    }

    let itemList = items.join(", ");
    alert("You bought the following items:\n" + itemList);
    }

    function deleteItems() {
    localStorage.removeItem("basket");
    document.getElementById("basket-items").innerHTML = "";
    alert("Your basket has been cleared.");
    }

  </script>
</body>
</html>
